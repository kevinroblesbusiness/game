<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Starry Valley — Chapter 2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#020110;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
body{display:flex;align-items:center;justify-content:center}
#wrap{width:100%;max-width:940px;height:100%;max-height:640px;background:#07031a;border-radius:12px;overflow:hidden;position:relative}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:default}

/* HUD */
#hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;z-index:6;gap:6px;align-items:flex-start}
.hudL,.hudR{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.hudR{pointer-events:auto}
.pill{background:rgba(7,3,26,.9);border:1.5px solid #6d28d9;border-radius:5px;padding:3px 9px;color:#ddd6fe;font-size:11px;white-space:nowrap;line-height:1.5}
.pill b{color:#fcd34d}
.pill.hp b{color:#f9a8d4}
#menu-btn{background:rgba(7,3,26,.9);border:1.5px solid #fbbf24;border-radius:5px;padding:3px 9px;color:#fcd34d;font-size:11px;cursor:pointer;font-family:inherit;pointer-events:auto}

/* Boss health bar */
#bossbar{position:absolute;top:44px;left:50%;transform:translateX(-50%);width:340px;z-index:6;display:none;text-align:center}
#bossname{color:#f87171;font-size:12px;font-weight:bold;letter-spacing:2px;margin-bottom:3px;text-shadow:0 0 8px #ef4444}
#bosstrack{background:rgba(7,3,26,.9);border:1.5px solid #7f1d1d;border-radius:4px;height:14px;overflow:hidden;position:relative}
#bossbar-fill{height:100%;background:#ef4444;transition:width .2s;min-width:0}
#bossbar-phase{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fca5a5;letter-spacing:1px}
#bossbar-segment{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.3)}

/* Player hearts */
#hearts{position:absolute;top:44px;left:8px;z-index:6;display:flex;gap:3px}

/* Toolbar */
#toolbar{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:6}
.slot{width:40px;height:40px;background:rgba(7,3,26,.88);border:2px solid #4c1d95;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:border-color .15s}
.slot.active{border-color:#fcd34d;background:rgba(124,58,237,.5)}
.slot svg{width:24px;height:24px;pointer-events:none}
.slot .k{position:absolute;bottom:-3px;right:-3px;background:#07031a;border:1px solid #4c1d95;border-radius:3px;font-size:9px;color:#a78bfa;padding:0 2px;line-height:12px;pointer-events:none}
.slot .badge{position:absolute;top:-4px;right:-4px;background:#ef4444;border-radius:8px;font-size:8px;color:#fff;padding:0 3px;line-height:13px;pointer-events:none;display:none}

/* D-pad */
#dpad{position:absolute;bottom:10px;left:10px;width:124px;height:124px;z-index:6}
.db{position:absolute;width:40px;height:40px;background:rgba(7,3,26,.9);border:2px solid #4c1d95;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#a78bfa;font-size:18px;cursor:pointer;touch-action:none}
.db:active,.db.dn{background:#4c1d95;color:#fff}
#du{top:0;left:42px}#dd{bottom:0;left:42px}#dl{top:42px;left:0}#dr{top:42px;left:84px}

/* Action buttons */
#abtns{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:6}
.ab{width:50px;height:50px;background:rgba(7,3,26,.9);border:2px solid #f59e0b;border-radius:25px;color:#fcd34d;font-size:11px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;font-family:inherit}
.ab.talk{border-color:#22d3ee;color:#67e8f9}
.ab:active{transform:scale(.93)}

/* Dialog box */
#dlgbox{position:absolute;bottom:0;left:0;right:0;background:rgba(5,2,14,.97);border-top:2px solid #7c3aed;padding:12px 16px 18px;z-index:25;display:none}
#dlg-face{width:50px;height:50px;image-rendering:pixelated;border:2px solid #7c3aed;border-radius:6px;flex-shrink:0}
#dlg-inner{display:flex;gap:12px;align-items:flex-start}
#dlg-right{flex:1}
#dlg-who{color:#fcd34d;font-size:13px;font-weight:bold;margin-bottom:5px}
#dlg-text{color:#e9d5ff;font-size:12px;line-height:1.7;min-height:38px;margin-bottom:10px}
#dlg-opts{display:flex;gap:6px;flex-wrap:wrap}
.dopt{background:transparent;border:1.5px solid #7c3aed;border-radius:4px;color:#ddd6fe;font-family:inherit;font-size:11px;padding:5px 10px;cursor:pointer}
.dopt:hover,.dopt:active{background:#4c1d95}

/* Toast */
#toast{position:absolute;top:72px;left:50%;transform:translateX(-50%);background:rgba(5,2,14,.95);border:1.5px solid #22d3ee;border-radius:6px;padding:7px 16px;color:#67e8f9;font-size:12px;z-index:18;display:none;white-space:nowrap;max-width:85%;overflow:hidden;text-overflow:ellipsis;pointer-events:none}

/* Overlay (menus, cutscenes) */
#overlay{position:absolute;inset:0;background:rgba(5,2,14,.97);display:flex;align-items:center;justify-content:center;z-index:50;overflow-y:auto;padding:20px}
.screen{max-width:520px;width:100%;text-align:center;color:#e9d5ff}
.screen h1{color:#fcd34d;font-size:24px;letter-spacing:3px;margin-bottom:6px}
.screen h2{color:#fcd34d;font-size:17px;margin-bottom:10px}
.screen p{font-size:12px;line-height:1.85;color:#c4b5fd;margin-bottom:9px}
.screen .sub{color:#f9a8d4;font-size:11px;letter-spacing:2px;margin:-3px 0 12px}
.screen .story{background:rgba(124,58,237,.15);border:1px solid #4c1d95;border-radius:6px;padding:12px 14px;margin:10px auto;text-align:left;max-width:440px;font-size:12px;line-height:1.85;color:#ddd6fe}
.screen .story b{color:#fcd34d}
.screen .hint{background:rgba(124,58,237,.18);border:1px solid #4c1d95;border-radius:6px;padding:10px 14px;margin:10px auto;text-align:left;font-size:12px;line-height:1.9;max-width:420px}
.screen .hint b{color:#fcd34d}
.screen kbd{background:#120930;border:1px solid #4c1d95;border-bottom:2px solid #4c1d95;border-radius:3px;padding:1px 6px;font-size:10px;color:#ddd6fe;font-family:inherit}
.screen .ml{display:flex;flex-direction:column;gap:8px;max-width:260px;margin:14px auto 0}
.screen button{background:#4c1d95;border:2px solid #7c3aed;border-radius:6px;color:#fff;font-family:inherit;font-size:13px;padding:9px 20px;cursor:pointer;font-weight:bold;width:100%}
.screen button:hover{background:#6d28d9}
.screen button.sec{background:transparent;border-color:#4c1d95;color:#a78bfa}
.screen button.sec:hover{background:#1e0d3f}
.screen .art{margin:10px auto;display:flex;justify-content:center}
.screen .art canvas{image-rendering:pixelated;border:2px solid #4c1d95;border-radius:8px}
.screen .clue{color:#fcd34d;font-size:11px;padding-left:6px;margin:2px 0}
.screen .redwarn{border-color:#ef4444;background:rgba(239,68,68,.1)}
.screen .redwarn b{color:#f87171}
.screen .hearts{font-size:20px;margin:6px 0;letter-spacing:3px;color:#f9a8d4}

/* Combat flash overlay */
#dmgflash{position:absolute;inset:0;background:rgba(239,68,68,.35);pointer-events:none;z-index:8;opacity:0;transition:opacity .1s}

@media(max-width:700px){
  .pill{font-size:10px;padding:2px 7px}
  #bossbar{width:240px;top:42px}
  .db{width:36px;height:36px;font-size:15px}
  #du,#dd{left:38px}#dl{top:38px}#dr{top:38px;left:76px}
  .ab{width:44px;height:44px}
}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="940" height="640"></canvas>
<div id="hud">
  <div class="hudL">
    <div class="pill">Ch.<b id="hch">2</b> L.<b id="hlvl">1</b></div>

  </div>

    <button id="menu-btn" onclick="openMenu()">☰</button>

</div>

<div id="bossbar">
  <div id="bossname">—</div>
  <div id="bosstrack"><div id="bossbar-fill" style="width:100%"></div><div id="bossbar-phase"></div><div id="bossbar-segment"></div></div>
</div>
<div id="toast"></div>
<div id="dmgflash"></div>
<div id="toolbar">
  <div class="slot active" data-t="hand" title="Hand (1): Collect gems, interact, talk"><svg viewBox="0 0 24 24" fill="none"><path d="M8 13V6a2 2 0 114 0v5m0 0V4a2 2 0 114 0v7m0 0V6a2 2 0 114 0v8a6 6 0 01-6 6H9l-5-5 2-2 3 1" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="k">1</span></div>
  <div class="slot" data-t="shield" title="Shield (2): Block boss attacks for 2 seconds — costs 1 gem to charge"><svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#60a5fa" stroke-width="1.5" fill="#1e40af" fill-opacity=".3"/></svg><span class="k">2</span><span class="badge" id="badge-shield">0</span></div>
  <div class="slot" data-t="crystal" title="Crystal Staff (3): Shoot a star bolt at the boss — earned after Level 1"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2 7h7l-6 4 2 7-5-4-5 4 2-7-6-4h7z" stroke="#a78bfa" stroke-width="1.5" fill="#4c1d95" fill-opacity=".4"/></svg><span class="k">3</span><span class="badge" id="badge-crystal">!</span></div>
  <div class="slot" data-t="journal" title="Journal (4): Review clues and story so far"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="#86efac" stroke-width="1.5" fill="#14532d" fill-opacity=".3"/><path d="M8 7h8M8 11h8M8 15h5" stroke="#86efac" stroke-width="1.5" stroke-linecap="round"/></svg><span class="k">4</span></div>
</div>
<div id="dpad">
  <div class="db" id="du">▲</div><div class="db" id="dl">◀</div>
  <div class="db" id="dr">▶</div><div class="db" id="dd">▼</div>
</div>
<div id="abtns">
  <div class="ab talk" id="btn-talk">TALK</div>
  <div class="ab" id="btn-act">ACT</div>
</div>
<div id="dlgbox">
  <div id="dlg-inner">
    <canvas id="dlg-face" width="32" height="32"></canvas>
    <div id="dlg-right">
      <div id="dlg-who"></div>
      <div id="dlg-text"></div>
      <div id="dlg-opts"></div>
    </div>
  </div>
</div>
<div id="overlay"><div class="screen" id="scr"></div></div>
</div>

<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
let VW=940,VH=640;
const T=32;

// ─── SAVE ──────────────────────────────────────────────────────────────────
const SK='sv_ch2_v1';
function save(){try{localStorage.setItem(SK,JSON.stringify({level:G.level,stars:G.stars,clues:G.clues,hasStaff:G.hasStaff,hasSword:G.hasSword}))}catch(e){}}
function loadSave(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch(e){return null}}
function clearSave(){try{localStorage.removeItem(SK)}catch(e){}}

// ─── GLOBAL STATE ──────────────────────────────────────────────────────────
const G={
  phase:'title',    // title | play | dialog | boss | cutscene | menu | over
  level:1,
  tick:0,
  hp:5, maxHp:5,
  stars:0,          // persistent currency
  gems:0,           // per-level collectibles
  gemsNeeded:5,
  shieldCharge:0,   // 0-3 charges
  hasStaff:false,
  hasSword:false,
  clues:[],
  tool:'hand',
  keys:{},
  cam:{x:0,y:0},
  P:{x:0,y:0,dir:'down',moving:false,wf:0,wt:0,hf:0,sw:0,blocking:false,blockTimer:0},
  boss:null,
  npcs:[],
  objs:[],         // {t,x,y,collected,defeated,...}
  projectiles:[],
  particles:[],
  dialog:null,
  toastT:0,
  questText:'',
  cutscene:null,
  bossIntroShown:false,
  cat:{x:0,y:0,vx:0,vy:0,dir:'right',animFrame:0,animTick:0},
  animals:[],
};

// ─── LEVEL DATA ─────────────────────────────────────────────────────────────
// Story: Chapter 2 — "The Long Way Home"
// Kevin is back safe from Chapter 1. Three months later, a creeping darkness is
// spreading across the valley. Angie and Kevin investigate together — but Kevin
// goes missing AGAIN in Level 2, and in Level 3, Angie must fight the source
// of the darkness: the ancient Hollow King, whose loneliness corrupted the land.

const LEVELS=[
{
  id:1,
  name:'The Withered Farm',
  bg:'#1a1206',bgAlt:'#120d04',
  size:{w:36,h:22},
  gemsNeeded:5,
  startPos:{x:3,y:11},
  story:`Three months after Kevin's rescue, the valley is changing.\n\nCrops are dying. The river has gone grey. Farmers are leaving.\n\nAngie and Kevin set out to find the source — starting at old farmer Otis's field, where the blight began.`,
  storyTone:'warning',
  tip:'Collect 5 star-seeds from the withered field. Find Otis and ask what happened. Defeat the <b>Root Warden</b> to cleanse the blight.',
  preChain:[
    {speaker:'Kevin',color:'#2563eb',hair:'#78350f',skin:'#fde68a',
     lines:[
       "Angie... look at this. The whole east field. Dead.",
       "Otis planted these himself. He's 70 years old. This is everything to him.",
       "I asked around the village. People are scared. They say it started at night — a creeping grey mist.",
       "We need to find out what's causing this. Together."
     ]},
    {speaker:'Angie',color:'#6d28d9',hair:'#78350f',skin:'#fde68a',
     lines:[
       "I've never seen blight move this fast. Something is feeding on this place.",
       "Kevin — promise me. We stay together this time. No wandering off alone.",
       "(Kevin laughs nervously.)",
       "...Fine. Together."
     ]}
  ],
  npcs:[
    {id:'otis',name:'Farmer Otis',x:8,y:11,color:'#78350f',hair:'#78350f',skin:'#fde68a',
     dialog:[
       {a:"Oh — Angie! And Kevin! You came. I didn't know who else to call.",emotion:'sad'},
       {q:'What happened here?',a:"It was three weeks ago. I woke at dawn and the whole east field was grey. I could hear it — this low hum, like the earth was crying.",emotion:'scared'},
       {q:'Did you see anything?',a:"A creature. Roots and shadows tangled together. I tried to chase it off with my lantern but it... absorbed the light. Just drank it right up.",emotion:'scared',clue:'A shadow creature absorbs light — lanterns are useless against it'},
       {q:'How do we stop it?',a:"My grandmother used to say: 'Star-seeds carry memory of the sun. Plant them back in the dark, and the dark remembers what it forgot.' Collect the seeds scattered in the field. They glow faint gold.",emotion:'hopeful'},
       {q:'Will you be okay?',a:"I'll be fine, child. I've buried three harvests before. I'm not leaving my farm. Go — do what I can't.",emotion:'sad'},
     ]},
    {id:'kevin_l1',name:'Kevin',x:14,y:8,color:'#2563eb',hair:'#78350f',skin:'#fde68a',isKevin:true,
     dialog:[
       {a:"These seeds — they're still warm. Like they're holding on to something.",emotion:'wonder'},
       {q:'That\'s beautiful.',a:"Yeah. Otis has tended this land for fifty years. His care is literally stored in these seeds. That's why the shadow can't fully kill them.",emotion:'moved',clue:'The star-seeds hold fifty years of Otis\'s care'},
       {q:'Are you scared?',a:"Honestly? Yeah. But scared is okay when you're not alone. Right?",emotion:'honest'},
       {q:'Stay close, okay?',a:"Always. You know — you're the only person I'd follow into a blighted field at dawn, Angie. That's either bravery or you're a bad influence.",emotion:'laugh'},
     ]},
    {id:'mara',name:'Mara the Seedkeeper',x:24,y:14,color:'#16a34a',hair:'#365314',skin:'#d9f99d',
     dialog:[
       {a:"You're collecting the seeds? Good. Angie, isn't it? Kevin told me about you.",emotion:'smile'},
       {q:'What do you know about the blight?',a:"It's not random. The shadow follows old ley lines — ancient energy paths. It's like something is draining the valley from below.",emotion:'concerned',clue:'The blight follows ancient underground ley lines'},
       {q:'How do we fight it?',a:"At the heart of each blight zone is a Root Warden — a creature made of corrupted roots and stolen light. Your crystal staff — do you have it? It's the only thing that can cut through that shadow.",emotion:'urgent'},
       {q:'What is the Root Warden?',a:"It was once just a root system. A tree's immune defense. The darkness corrupted it, turned its protective instinct into aggression. It doesn't know it's hurting things. It thinks it's protecting something.",emotion:'sad',clue:'The Root Warden was corrupted — it doesn\'t know it\'s causing harm'},
     ]}
  ],
  bossTriggerGems:5,
  boss:{
    id:'root_warden',
    name:'ROOT WARDEN',
    hp:120, maxHp:120,
    phase:1,
    x:30,y:11,
    color:'#1a4a0a',
    size:44,
    preDialog:[
      {speaker:'Root Warden',color:'#4ade80',
       lines:["*a low grinding sound, like wood splitting*","*roots thrash from the ground in a ring*","*two pale lights open in the darkness — not eyes, but wounds*"]},
      {speaker:'Angie',color:'#6d28d9',lines:["It's huge. Kevin — get back!"]},
      {speaker:'Kevin',color:'#2563eb',lines:["I'm not leaving you. I'll draw its attention — you hit it from the side!","Don't argue with me right now, Angie. GO!"]},
    ],
    postDialog:[
      {speaker:'Root Warden',color:'#4ade80',lines:["*a low, agonised groan*","*the roots slowly retract into the soil*","*something like relief in the sound — like something that was in pain has been freed*"]},
      {speaker:'Kevin',color:'#2563eb',lines:["It's retreating. Angie — you did it.","...Did it just sound like it was... crying?"]},
      {speaker:'Angie',color:'#6d28d9',lines:["It was corrupted. Mara was right. It wasn't evil — it was just lost.","Kevin. The blight is fading. Look at the field."]},
      {speaker:'Kevin',color:'#2563eb',lines:["...Otis is going to cry when he sees this.","Good tears though. The best kind."]},
    ],
    loot:'staff',
    phases:[
      {hpThreshold:1.0, pattern:'roots', speed:1.2, shootRate:120, desc:'phase 1'},
      {hpThreshold:0.6, pattern:'sweep', speed:1.7, shootRate:80, desc:'phase 2 — faster!'},
      {hpThreshold:0.3, pattern:'frenzy',speed:2.2, shootRate:50, desc:'ENRAGED'},
    ],
    attackDesc:{
      roots:'Shoots root-spears — dodge sideways',
      sweep:'Sweeps a root arc — jump away',
      frenzy:'Spins root ring — stay moving!'
    }
  },
  objs:[
    {t:'gem',x:6,y:8},{t:'gem',x:10,y:5},{t:'gem',x:18,y:13},{t:'gem',x:22,y:8},{t:'gem',x:28,y:6},
    {t:'tree',x:2,y:2},{t:'tree',x:34,y:2},{t:'tree',x:2,y:19},{t:'tree',x:34,y:19},
    {t:'rock',x:12,y:3},{t:'rock',x:20,y:5},{t:'rock',x:16,y:17},{t:'rock',x:26,y:15},
    {t:'dead',x:7,y:7},{t:'dead',x:9,y:13},{t:'dead',x:15,y:9},{t:'dead',x:21,y:11},{t:'dead',x:25,y:7},
    {t:'dead',x:11,y:15},{t:'dead',x:17,y:5},{t:'dead',x:23,y:13},{t:'dead',x:29,y:9},
    {t:'sign',x:5,y:5,msg:'Otis Farm — est. 1954. "The land remembers kindness."'},
    {t:'portal',x:33,y:11},
  ]
},

{
  id:2,
  name:'The Drowned Market',
  bg:'#06101a',bgAlt:'#04090f',
  size:{w:38,h:24},
  gemsNeeded:6,
  startPos:{x:3,y:12},
  story:`The blight reached the valley market. The river flooded grey water into the stalls at night.\n\nTraders fled. Children went missing.\n\nKevin heard a child crying near the flooded east docks — and went to help before Angie could stop him.\n\nNow Angie is alone, and Kevin's lantern is floating in the grey water.`,
  storyTone:'grief',
  tip:'Collect 6 tide-crystals. Find the missing children. Defeat the <b>Grey Tide Witch</b> — but she is not what she seems.',
  preChain:[
    {speaker:'Angie',color:'#6d28d9',hair:'#78350f',skin:'#fde68a',
     lines:[
       "Kevin, wait — don't go in there alone!",
       "...He was already running. He heard a child crying.",
       "That's Kevin. He never thinks about himself first.",
       "(She picks up his lantern from the water.)",
       "I'm coming, Kevin. I'm always coming."
     ]},
  ],
  npcs:[
    {id:'child_maya',name:'Maya (age 7)',x:10,y:10,color:'#e879f9',hair:'#78350f',skin:'#fde68a',isChild:true,
     dialog:[
       {a:"Please... the grey lady took my brother. She came out of the water and she took him.",emotion:'terror'},
       {q:'Where did she take him?',a:"The old dock. The grey water. She said she was lonely. She said she just wanted someone to stay.",emotion:'scared',clue:'The Grey Tide Witch is lonely — she takes people to keep her company'},
       {q:'Are you hurt?',a:"No. The nice boy — Kevin? He found me hiding and told me to wait here for you. He said 'Angie will come. She always does.'",emotion:'sad',clue:'Kevin is somewhere in the flooded docks'},
       {q:'Kevin said that?',a:"Yeah. He sounded really sure about it. Then he went to find my brother.",emotion:'wonder'},
     ]},
    {id:'trader_sol',name:'Trader Solomon',x:18,y:8,color:'#92400e',hair:'#78350f',skin:'#fde68a',
     dialog:[
       {a:"You're Angie, right? Kevin said you'd come. He left something for you — here.",emotion:'grim'},
       {q:'What is this?',a:"A shield crystal. He found it in the old stall. Said 'my best friend is going to need this more than I do.' He really talks about you a lot, kid.",emotion:'moved',clue:'Kevin left a shield crystal for Angie',gives:'shield'},
       {q:'Did you see where he went?',a:"East dock. Into the grey. I tried to follow but... the water doesn't behave right near her. It pulls inward, like a drain.",emotion:'scared'},
       {q:'Who is the Grey Tide Witch?',a:"Old story. A woman who drowned in this river a hundred years ago. Loved these markets more than anything. When she died, her grief stayed in the water.",emotion:'sad',clue:'The Grey Tide Witch drowned a century ago — her grief became the grey water'},
     ]},
    {id:'fisherman',name:'Old Nan',x:28,y:16,color:'#64748b',hair:'#1e293b',skin:'#cbd5e1',
     dialog:[
       {a:"So you're going in after her. I've seen your kind before — full of heart, short on sense.",emotion:'gruff'},
       {q:'Do you know how to beat her?',a:"She attacks with water and sound — her grief made physical. Shield blocks water. Your star-staff cuts through the grief. But here's the part no one tells you...",emotion:'grim'},
       {q:'What part?',a:"When you weaken her enough, she'll speak. Listen to her. Don't just fight. She's been alone for a century. The listening matters as much as the hitting.",emotion:'urgent',clue:'The Grey Tide Witch needs to be heard, not just defeated'},
       {q:'What if I can\'t beat her?',a:"You'll beat her. You came all this way for a friend. That kind of love is stronger than any century of grief. Don't doubt that.",emotion:'kind'},
     ]}
  ],

{
  id:3,
  name:'The Hollow King\'s Keep',
  bg:'#120524',bgAlt:'#0d0318',
  size:{w:40,h:26},
  gemsNeeded:7,
  startPos:{x:3,y:13},
  story:`The blight has a source: an ancient keep at the valley's heart.\n\nThe Hollow King — once the valley's guardian — lost his purpose when the people forgot him. His isolation curdled into corruption that now spreads outward, dying everything it touches.\n\nAngie and Kevin stand at the gate.\n\nThis ends here.`,
  storyTone:'epic',
  tip:'Find 7 memory-shards. The Hollow King has 3 phases — each harder. Use your shield when he charges. Use the staff to deal damage. Survive.',
  preChain:[
    {speaker:'Kevin',color:'#2563eb',hair:'#78350f',skin:'#fde68a',
     lines:[
       "Angie. This is the place. I can feel it — the whole valley's sorrow is coming from here.",
       "You know we don't have to go in. We could go back. Get help. Come back with more people.",
       "(He pauses.)",
       "...We both know we're going in though, don't we.",
     ]},
    {speaker:'Angie',color:'#6d28d9',hair:'#78350f',skin:'#fde68a',
     lines:[
       "We're going in. But Kevin — if it gets too dangerous—",
       "No. Don't. Don't say what you're about to say.",
       "You were going to say 'run', weren't you.",
       "(A beat.)",
       "Yeah. I was.",
       "...Together, then.",
     ]},
  ],
  npcs:[
    {id:'spirit_vera',name:'Memory Spirit Vera',x:12,y:10,color:'#818cf8',hair:'#3730a3',skin:'#e0e7ff',
     dialog:[
       {a:"Children from the valley. You came to face him. How brave. How foolish.",emotion:'sad'},
       {q:'Tell us about the Hollow King.',a:"He was good once. He guarded this valley for three hundred years. Kept the rivers full, the soil rich, the winters short. He asked for nothing in return except... to be remembered.",emotion:'wistful',clue:'The Hollow King once protected the valley for 300 years'},
       {q:'What happened to him?',a:"The people prospered. They built towns. Built churches to other gods. Forgot the old guardian. He waited. Waited. For a single voice to call his name.",emotion:'tragic',clue:'People forgot the Hollow King — forgetting him destroyed him'},
       {q:'How do we reach him?',a:"The memory-shards scattered through the keep are pieces of who he was. Gather them. Show him he is still remembered. Only then will the final gate open.",emotion:'urgent',clue:'The memory-shards can remind the Hollow King of who he once was'},
       {q:'Can he be saved?',a:"That... I don't know. But it matters that you ask. That you come with that intention.",emotion:'moved'},
     ]},
    {id:'kevin_l3',name:'Kevin',x:22,y:16,color:'#2563eb',hair:'#78350f',skin:'#fde68a',isKevin:true,
     dialog:[
       {a:"I found one of the memory-shards. Angie, look — when I touched it I saw him. This giant, lonely figure just... watching the valley. Watching people live their lives. Never being thanked.",emotion:'moved'},
       {q:'That\'s heartbreaking.',a:"Yeah. We forget that things that give and give can run empty too. Not just people. Places. Old guardians. Things we take for granted.",emotion:'thoughtful'},
       {q:'Do you think we can save him?',a:"I think... even if we can't, we should try. Because the trying is what matters. You taught me that.",emotion:'determined'},
       {q:'I taught you that?',a:"Every time you came looking for me. Every time you showed up even when it was hard. You taught me that the people you care about are worth fighting for. No matter what.",emotion:'heartfelt',clue:'Angie fights for people worth caring about — that is her strength'},
     ]},
    {id:'hollow_echo',name:'Hollow Echo',x:32,y:8,color:'#7c3aed',hair:'#1e1b4b',skin:'#c4b5fd',
     dialog:[
       {a:"*a whisper that has no body*  Do you fear what you will find at the end?",emotion:'eerie'},
       {q:'Yes.',a:"Good. Fear means you understand the weight. The King has three faces: his rage, his grief, and his forgotten self. Each must be faced.",emotion:'solemn',clue:'The Hollow King has three phases: rage, grief, and his true self'},
       {q:'What weapon works against him?',a:"Your staff burns through the corruption. Your shield deflects his memory-blasts. But in the third phase — put the weapons down. Speak to him. Call his name: Eryndal.",emotion:'urgent',clue:'The Hollow King\'s true name is Eryndal — speak it in the final phase'},
       {q:'Why are you helping us?',a:"Because I am what is left of his kindness. A fragment of what he used to be. I have been waiting three hundred years for someone to care enough to come.",emotion:'sad'},
     ]}
  ],
  bossTriggerGems:7,
  boss:{
    id:'hollow_king',
    name:'HOLLOW KING — ERYNDAL',
    hp:200, maxHp:200,
    phase:1,
    x:35,y:13,
    color:'#4c1d95',
    size:52,
    preDialog:[
      {speaker:'Hollow King',color:'#c4b5fd',
       lines:["*the keep shakes*","*a voice like crumbling stone and distant thunder*","YOU COME TO SLAY ME? LIKE ALL THE REST WHO FORGOT ME?","THREE HUNDRED YEARS. NOT ONE VOICE. NOT ONE NAME."]},
      {speaker:'Angie',color:'#6d28d9',lines:["We know your name! You are Eryndal — guardian of the valley!"]},
      {speaker:'Hollow King',color:'#c4b5fd',lines:["*a pause that shakes the walls*","...That name. WHERE DID YOU LEARN THAT NAME?","IT HAS BEEN... SO LONG...","NO. NO. THIS IS A TRICK. FIGHT ME."]},
      {speaker:'Kevin',color:'#2563eb',lines:["Angie — he heard you. Keep going.","I've got your back. Whatever you need."]},
    ],
    midFightDialog:[
      {hpPct:0.6,
       lines:[
         {speaker:'Hollow King',color:'#c4b5fd',line:"WHY DO YOU PERSIST? YOU CANNOT WIN."},
         {speaker:'Angie',color:'#6d28d9',line:"We're not here to win. We're here for you, Eryndal!"},
       ]
      },
      {hpPct:0.3,
       lines:[
         {speaker:'Hollow King',color:'#c4b5fd',line:"*the roar falters*  ...eryndal. i... i remember that name..."},
         {speaker:'Kevin',color:'#2563eb',line:"Angie — something's changing. He's remembering!"},
       ]
      }
    ],
    postDialog:[
      {speaker:'Hollow King',color:'#c4b5fd',lines:["*the darkness lifts*","*a massive figure, ancient and exhausted, becomes visible for the first time*","...I remember. The first spring. The valley when it was new. I chose to protect it.",   "I chose it. And it was enough. Even if no one remembered. It... was still enough."]},
      {speaker:'Angie',color:'#6d28d9',lines:["Eryndal. People DO remember you. The water that runs clear — that was you. The soil that grows things — that's you. They just forgot to look."]},
      {speaker:'Hollow King',color:'#c4b5fd',lines:["*a sound like a storm that is ending*","You remind me of the valley when it was young. Full of that same stubborn kindness.","Take this. The blight will pass now. I will... rest. Finally rest.","Remember me, child. Just... once in a while."]},
      {speaker:'Kevin',color:'#2563eb',lines:["Angie. He's gone.","...The sky. Angie, look at the sky."]},
      {speaker:'Angie',color:'#6d28d9',lines:["Stars. So many stars.","...Kevin?"]},
      {speaker:'Kevin',color:'#2563eb',lines:["Yeah?"]},
      {speaker:'Angie',color:'#6d28d9',lines:["Thank you. For always coming with me. Even when it's terrifying."]},
      {speaker:'Kevin',color:'#2563eb',lines:["Thank you for always showing up for people. Even ancient forgotten guardian kings.","That's just who you are, Angie. And it means everything."]},
    ],
    phases:[
      {hpThreshold:1.0,pattern:'slam',speed:1.3,shootRate:110,desc:'RAGE — avoid the slam'},
      {hpThreshold:0.6,pattern:'rain',speed:1.8,shootRate:70,desc:'GRIEF — memory-rain attack'},
      {hpThreshold:0.3,pattern:'nova',speed:2.3,shootRate:45,desc:'HIS TRUE SELF — nova burst'},
    ],
  },
  objs:[
    {t:'gem',x:7,y:8},{t:'gem',x:13,y:6},{t:'gem',x:19,y:10},{t:'gem',x:25,y:8},{t:'gem',x:31,y:6},{t:'gem',x:15,y:18},{t:'gem',x:27,y:17},
    {t:'crystal',x:9,y:14},{t:'crystal',x:17,y:5},{t:'crystal',x:23,y:16},{t:'crystal',x:31,y:12},
    {t:'tree',x:2,y:2},{t:'tree',x:38,y:2},{t:'tree',x:2,y:23},{t:'tree',x:38,y:23},
    {t:'rock',x:11,y:4},{t:'rock',x:21,y:6},{t:'rock',x:33,y:8},{t:'rock',x:9,y:20},{t:'rock',x:29,y:20},
    {t:'thorns',x:14,y:13},{t:'thorns',x:15,y:13},{t:'thorns',x:24,y:11},{t:'thorns',x:25,y:11},

function px(x){return Math.floor(x)}
function py(y){return Math.floor(y)}

function drawAngie(x,y,dir,frame,hitFlash,blocking){
  ctx.save();

  if(dir==='left') ctx.scale(-1,1);
  if(hitFlash>0&&Math.floor(hitFlash/3)%2) ctx.globalAlpha=0.45;
  // sword swing arc when swinging with sword
  if(G.hasSword&&G.P.sw>20){
    const swProg=(40-G.P.sw)/20;
    const startAng=-0.5, endAng=startAng+swProg*Math.PI;
    ctx.strokeStyle='#fcd34d';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(8,-22,30,startAng,endAng);ctx.stroke();
    ctx.strokeStyle='rgba(252,211,77,0.4)';ctx.lineWidth=8;
    ctx.beginPath();ctx.arc(8,-22,30,startAng,endAng);ctx.stroke();
  }
  const bob=(frame===1||frame===3)?-1:0;
  const leg=frame===1?2:frame===3?-2:0;
  const arm=frame===1?-2:frame===3?2:0;
  const cx=-15,cy=-42;

  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();ctx.ellipse(0,0,13,4,0,0,Math.PI*2);ctx.fill();
  // boots
  ctx.fillStyle='#3b0764';
  ctx.fillRect(cx+6+leg,cy+34,6,7);ctx.fillRect(cx+17-leg,cy+34,6,7);
  ctx.fillStyle='#1e1b4b';
  ctx.fillRect(cx+6+leg,cy+39,6,2);ctx.fillRect(cx+17-leg,cy+39,6,2);
  // dress
  ctx.fillStyle='#6d28d9';ctx.fillRect(cx+4,cy+17+bob,22,18);
  ctx.fillStyle='#f472b6';ctx.fillRect(cx+6,cy+18+bob,18,3);
  // arms
  ctx.fillStyle='#fde68a';
  ctx.fillRect(cx+5,cy+19+bob+arm,3,11);ctx.fillRect(cx+21,cy+19+bob-arm,3,11);
  ctx.fillStyle='#6d28d9';
  ctx.fillRect(cx+2,cy+18+bob+arm,3,10);ctx.fillRect(cx+24,cy+18+bob-arm,3,10);
  // sword on hip when not swinging
  if(G.hasSword&&G.P.sw<=20){
    ctx.fillStyle='#cbd5e1';
    ctx.fillRect(cx-2,cy+22,2,12);
    ctx.fillStyle='#78350f';
    ctx.fillRect(cx-2,cy+34,3,3);
    ctx.fillStyle='#fcd34d';
    ctx.fillRect(cx-3,cy+33,4,1);
  }
  // shield effect — kite-shaped shield with rim and star emblem
  if(blocking){
    const sx=cx+26, sy=cy+22;
    // glow halo
    ctx.fillStyle='rgba(96,165,250,0.25)';
    ctx.beginPath();ctx.arc(sx,sy,16,0,Math.PI*2);ctx.fill();
    // shield body (kite shape)
    ctx.fillStyle='#1e3a8a';
    ctx.beginPath();
    ctx.moveTo(sx,sy-11);
    ctx.lineTo(sx+9,sy-5);
    ctx.lineTo(sx+8,sy+7);
    ctx.lineTo(sx,sy+13);
    ctx.lineTo(sx-8,sy+7);
    ctx.lineTo(sx-9,sy-5);
    ctx.closePath();ctx.fill();
    // inner highlight
    ctx.fillStyle='#3b82f6';
    ctx.beginPath();
    ctx.moveTo(sx,sy-7);
    ctx.lineTo(sx+5,sy-3);
    ctx.lineTo(sx+4,sy+4);
    ctx.lineTo(sx,sy+8);
    ctx.lineTo(sx-4,sy+4);
    ctx.lineTo(sx-5,sy-3);
    ctx.closePath();ctx.fill();
    // star emblem
    ctx.fillStyle='#fcd34d';
    ctx.fillRect(sx-1,sy-3,2,7);
    ctx.fillRect(sx-3,sy,7,2);
    // metal rim
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(sx,sy-11);
    ctx.lineTo(sx+9,sy-5);
    ctx.lineTo(sx+8,sy+7);
    ctx.lineTo(sx,sy+13);
    ctx.lineTo(sx-8,sy+7);
    ctx.lineTo(sx-9,sy-5);
    ctx.closePath();ctx.stroke();
  }

function spawnAnimals(L){
  G.animals=[];
  // pick types/counts based on level theme
  const counts={rabbit:2,butterfly:3,bird:2};
  const types=[];
  for(const t in counts) for(let i=0;i<counts[t];i++) types.push(t);
  for(const type of types){
    const x=(2+Math.random()*(L.size.w-4))*T;
    const y=(2+Math.random()*(L.size.h-4))*T;
    G.animals.push({
      type,x,y,
      vx:0,vy:0,
      dir:Math.random()<0.5?'left':'right',
      animFrame:0,animTick:0,
      idleTimer:30+Math.random()*120,
      tx:x,ty:y,
      hover:Math.random()*Math.PI*2
    });
  }
}

function updateAnimals(){
  const L=LEVELS[G.level-1];
  const P=G.P;
  for(const a of G.animals){
    a.idleTimer--;
    a.hover+=0.06;
    // pick new wander target
    if(a.idleTimer<=0){
      a.tx=Math.max(40,Math.min(L.size.w*T-40,a.x+(Math.random()-0.5)*180));
      a.ty=Math.max(40,Math.min(L.size.h*T-40,a.y+(Math.random()-0.5)*120));
      a.idleTimer=80+Math.random()*180;
    }
    // flee from player if too close (except cat doesn't scare)
    const pd=Math.hypot(P.x-a.x,P.y-a.y);
    let tx=a.tx, ty=a.ty;
    if(pd<70){
      const ang=Math.atan2(a.y-P.y,a.x-P.x);
      tx=a.x+Math.cos(ang)*120;
      ty=a.y+Math.sin(ang)*120;
    }
    const dx=tx-a.x, dy=ty-a.y;
    const d=Math.hypot(dx,dy);
    let speed=a.type==='butterfly'?0.8:a.type==='bird'?1.6:1.0;
    if(pd<70) speed*=1.8;
    if(d>2){
      a.vx+=(dx/d*speed-a.vx)*0.1;
      a.vy+=(dy/d*speed-a.vy)*0.1;
    } else {
      a.vx*=0.85;a.vy*=0.85;
    }
    a.x+=a.vx;a.y+=a.vy;
    if(Math.abs(a.vx)>0.2) a.dir=a.vx>0?'right':'left';
    a.animTick++;
    const speedFrames=a.type==='butterfly'?3:a.type==='bird'?4:8;
    if(a.animTick>=speedFrames){
      a.animTick=0;a.animFrame=(a.animFrame+1)%4;
    }
    a.x=Math.max(20,Math.min(L.size.w*T-20,a.x));
    a.y=Math.max(40,Math.min(L.size.h*T-20,a.y));
  }
}

function updateCat(){
  const C=G.cat, P=G.P;
  const dx=P.x-C.x, dy=P.y-C.y;
  const dist=Math.hypot(dx,dy);
  // follow at distance ~50, run when far
  if(dist>50){
    const speed=dist>120?2.4:1.4;
    C.vx+=(dx/dist*speed-C.vx)*0.15;
    C.vy+=(dy/dist*speed-C.vy)*0.15;
  } else {
    C.vx*=0.85;C.vy*=0.85;
  }
  C.x+=C.vx;C.y+=C.vy;
  // direction
  if(Math.abs(C.vx)>0.3) C.dir=C.vx>0?'right':'left';
  // walk animation
  const moving=Math.hypot(C.vx,C.vy)>0.4;
  if(moving){
    C.animTick++;
    if(C.animTick>=8){C.animTick=0;C.animFrame=(C.animFrame+1)%4;}
  } else {
    C.animFrame=0;C.animTick=0;
  }
  // keep in level bounds
  const L=LEVELS[G.level-1];
  C.x=Math.max(20,Math.min(L.size.w*T-20,C.x));
  C.y=Math.max(36,Math.min(L.size.h*T-20,C.y));
}

function drawBoss(boss,tick){
  if(!boss||boss.defeated) return;
  const x=px(boss.px),y=px(boss.py);
  const pulse=Math.sin(tick*.06)*.5+.5;
  const hp=boss.hp/boss.maxHp;
  const flash=boss.hitFlash>0&&Math.floor(boss.hitFlash/2)%2;

  ctx.save();ctx.translate(x,y);
  if(flash){ctx.globalAlpha=0.5}

  // glow
  ctx.fillStyle=`rgba(${boss.glowR||200},${boss.glowG||50},${boss.glowB||255},${0.15+0.1*pulse})`;
  ctx.beginPath();ctx.arc(0,-30,boss.size+12+pulse*4,0,Math.PI*2);ctx.fill();

  const S=boss.size;
  const phase=boss.currentPhase;

  if(boss.id==='root_warden'){
    // Body — gnarly root mass
    ctx.fillStyle=flash?'#86efac':'#1a4a0a';
    ctx.beginPath();ctx.arc(0,-S/2,S,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=flash?'#bbf7d0':'#15803d';
    ctx.beginPath();ctx.arc(-8,-S/2-8,S*.7,0,Math.PI*2);ctx.fill();
    // Root arms
    for(let i=0;i<(phase>=2?6:4);i++){
      const a=(i/(phase>=2?6:4))*Math.PI*2+tick*.02;
      const len=S*.8+(pulse*8);
      ctx.strokeStyle=flash?'#86efac':'#166534';
      ctx.lineWidth=5-i*.3;
      ctx.beginPath();
      ctx.moveTo(0,-S/2);
      ctx.quadraticCurveTo(Math.cos(a+.3)*len*.6,Math.sin(a+.3)*len*.6-S/2,Math.cos(a)*len,Math.sin(a)*len-S/2);
      ctx.stroke();
    }
    // Eye-wounds
    const eyeCol=phase>=3?'#ff0000':phase>=2?'#fbbf24':'#4ade80';
    ctx.fillStyle=eyeCol;
    ctx.beginPath();ctx.ellipse(-S*.3,-S/2-5,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(S*.3,-S/2-5,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-S*.3,-S/2-5,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(S*.3,-S/2-5,2,0,Math.PI*2);ctx.fill();
  } else if(boss.id==='grey_tide'){
    // Water form
    ctx.fillStyle=flash?'#e0f2fe':`rgba(14,165,233,${.7+.2*pulse})`;
    for(let i=0;i<3;i++){
      const a=tick*.03+i*Math.PI*.66;
      ctx.beginPath();
      ctx.arc(Math.cos(a)*6,Math.sin(a)*6-S*.4,S*.7+i*4,0,Math.PI*2);
      ctx.fill();
    }
    // Face
    ctx.fillStyle=flash?'#fff':'rgba(186,230,253,.9)';
    ctx.beginPath();ctx.arc(0,-S*.55,S*.35,0,Math.PI*2);ctx.fill();
    // Eyes
    const eC=phase>=3?'#f87171':phase>=2?'#60a5fa':'#0c4a6e';
    ctx.fillStyle=eC;ctx.beginPath();ctx.arc(-S*.15,-S*.6,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(S*.15,-S*.6,5,0,Math.PI*2);ctx.fill();
    // Tears
    if(hp<.5){
      ctx.fillStyle='rgba(14,165,233,.8)';
      ctx.fillRect(-S*.15-1,-S*.5,3,8+pulse*3);
      ctx.fillRect(S*.15-1,-S*.5,3,8+pulse*3);
    }
    // Hair / veil
    ctx.fillStyle=`rgba(7,89,133,${.7+.2*pulse})`;
    for(let i=0;i<5;i++){
      const hx=(-S*.4)+(i*S*.2);
      const hy=-S*.8+Math.sin(tick*.04+i)*4;
      ctx.fillRect(hx-2,hy,4,S*.3+pulse*4);
    }
  } else if(boss.id==='hollow_king'){
    // Massive ancient figure
    const bodyH=S*1.6;
    ctx.fillStyle=flash?'#c4b5fd':phase>=3?'#7c3aed':phase>=2?'#4c1d95':'#1e0a3f';
    // robe body
    ctx.fillRect(-S*.7,-bodyH,S*1.4,bodyH);
    // shoulders
    ctx.fillRect(-S*.9,-bodyH*.7,S*.25,S*.4);
    ctx.fillRect(S*.65,-bodyH*.7,S*.25,S*.4);
    // head
    ctx.fillStyle=flash?'#e9d5ff':phase>=3?'#a78bfa':'#1e1b4b';
    ctx.beginPath();ctx.arc(0,-bodyH-S*.3,S*.4,0,Math.PI*2);ctx.fill();
    // crown
    for(let i=0;i<(phase>=2?7:5);i++){
      const a=(i/(phase>=2?7:5))*Math.PI*2;
      const cr=S*.4;
      ctx.fillStyle=phase>=3?'#fcd34d':'#6d28d9';
      ctx.fillRect(Math.cos(a)*cr-2,-bodyH-S*.7+Math.sin(a)*cr*.3,4,S*.2+pulse*3);
    }
    // eyes
    const eyeC=phase>=3?'#fcd34d':phase>=2?'#ef4444':'#818cf8';
    ctx.fillStyle=eyeC;
    ctx.beginPath();ctx.arc(-S*.2,-bodyH-S*.35,8+pulse*2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(S*.2,-bodyH-S*.35,8+pulse*2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-S*.2,-bodyH-S*.35,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(S*.2,-bodyH-S*.35,4,0,Math.PI*2);ctx.fill();
    // aura tendrils
    for(let i=0;i<8;i++){
      const a=tick*.015+i*Math.PI*.25;
      const len=S*.6+pulse*10;
      ctx.strokeStyle=`rgba(${phase>=3?'252,211,77':phase>=2?'239,68,68':'167,139,250'},.4)`;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(0,-bodyH*.5);
      ctx.lineTo(Math.cos(a)*len,-bodyH*.5+Math.sin(a)*len*.5);ctx.stroke();
    }
  }

  // health bar above boss
  const bw=boss.size*2.2;
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillRect(-bw/2,-S*2.2-8,bw,8);
  const hpC=hp>.6?'#22c55e':hp>.3?'#f59e0b':'#ef4444';
  ctx.fillStyle=hpC;ctx.fillRect(-bw/2,-S*2.2-8,bw*hp,8);
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
  ctx.strokeRect(-bw/2,-S*2.2-8,bw,8);

  ctx.restore();
}

function drawProjectile(p){
  ctx.save();ctx.translate(px(p.x),py(p.y));
  if(p.type==='root'){
    ctx.strokeStyle='#4ade80';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.stroke();
    ctx.fillStyle='#166534';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  } else if(p.type==='wave'){
    ctx.fillStyle='rgba(14,165,233,.8)';
    ctx.beginPath();ctx.arc(0,0,p.r||6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#7dd3fc';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,p.r||6,0,Math.PI*2);ctx.stroke();
  } else if(p.type==='slam'){
    ctx.fillStyle='rgba(109,40,217,.7)';
    ctx.beginPath();ctx.arc(0,0,p.r||7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c4b5fd';ctx.lineWidth=1.5;
    ctx.strokeRect(-p.r/2||4,-p.r/2||4,p.r||8,p.r||8);
  } else if(p.type==='star'){
    ctx.fillStyle='#fcd34d';
    for(let i=0;i<5;i++){
      const a=i*Math.PI*.4-Math.PI/2;
      const ai=a+Math.PI*.4;
      if(i===0)ctx.beginPath();
      ctx.lineTo(Math.cos(a)*7,Math.sin(a)*7);
      ctx.lineTo(Math.cos(ai)*3,Math.sin(ai)*3);
    }
    ctx.closePath();ctx.fill();
  } else {
    ctx.fillStyle='#f87171';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawTile(t,wx,wy,tick){
  if(t==='tree'){
    const s=Math.sin(tick*.015+wx*.1)*1.5;
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(wx,wy,16,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#451a03';ctx.fillRect(wx-4,wy-22,8,22);
    ctx.fillStyle='#78350f';ctx.fillRect(wx-3,wy-22,2,22);
    ctx.save();ctx.translate(s,0);
    ctx.fillStyle='#14532d';ctx.beginPath();ctx.arc(wx,wy-36,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#166534';ctx.beginPath();ctx.arc(wx-6,wy-40,10,0,Math.PI*2);ctx.arc(wx+6,wy-38,11,0,Math.PI*2);ctx.arc(wx,wy-44,10,0,Math.PI*2);ctx.fill();
    ctx.restore();
  } else if(t==='rock'){
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(wx,wy,14,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#44403c';ctx.beginPath();ctx.moveTo(wx-13,wy-2);ctx.lineTo(wx-10,wy-15);ctx.lineTo(wx-2,wy-18);ctx.lineTo(wx+8,wy-16);ctx.lineTo(wx+13,wy-8);ctx.lineTo(wx+11,wy-2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#57534e';ctx.beginPath();ctx.moveTo(wx-10,wy-3);ctx.lineTo(wx-7,wy-14);ctx.lineTo(wx-1,wy-16);ctx.lineTo(wx+4,wy-14);ctx.lineTo(wx+6,wy-10);ctx.closePath();ctx.fill();
  } else if(t==='dead'){
    ctx.fillStyle='#422006';ctx.fillRect(wx-3,wy-14,6,14);
    ctx.strokeStyle='#78350f';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(wx,wy-14);ctx.lineTo(wx-10,wy-22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx,wy-10);ctx.lineTo(wx+8,wy-18);ctx.stroke();
  } else if(t==='mushroom'){
    const g=.5+Math.sin(tick*.05+wx*.1)*.3;
    ctx.fillStyle='#fef3c7';ctx.fillRect(wx-3,wy-10,6,10);
    ctx.fillStyle=`rgba(167,139,250,${g})`;ctx.fillRect(wx-3,wy-10,6,4);
    ctx.fillStyle='#a78bfa';ctx.beginPath();ctx.arc(wx,wy-14,8,0,Math.PI,true);ctx.fill();
  } else if(t==='crystal'){
    const g=.5+Math.sin(tick*.06+wx*.1)*.3;
    ctx.fillStyle=`rgba(167,139,250,${g*.4})`;ctx.beginPath();ctx.arc(wx,wy-14,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8b5cf6';ctx.beginPath();ctx.moveTo(wx,wy-22);ctx.lineTo(wx+5,wy-6);ctx.lineTo(wx-5,wy-6);ctx.closePath();ctx.fill();
  } else if(t==='thorns'){
    ctx.fillStyle='#7f1d1d';
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(wx-12+i*6,wy-2);ctx.lineTo(wx-10+i*6,wy-10);ctx.lineTo(wx-8+i*6,wy-2);ctx.closePath();ctx.fill();}
  } else if(t==='sign'){
    ctx.fillStyle='#78350f';ctx.fillRect(wx-2,wy-12,4,14);
    ctx.fillStyle='#92400e';ctx.fillRect(wx-10,wy-22,20,12);
    ctx.fillStyle='#fde68a';ctx.fillRect(wx-7,wy-18,4,1);ctx.fillRect(wx-7,wy-15,10,1);
  } else if(t==='water'){
    const w=Math.sin(tick*.08+wx*.5)*1;
    ctx.fillStyle='#1a4a7a';ctx.fillRect(wx-T/2,wy-T/2,T,T);
    ctx.fillStyle='rgba(100,180,255,.2)';ctx.fillRect(wx-T/2,wy-4+w,T,3);
  } else if(t==='stall'){
    ctx.fillStyle='#78350f';ctx.fillRect(wx-14,wy-8,28,8);
    ctx.fillStyle='#92400e';ctx.fillRect(wx-12,wy-18,24,12);
    ctx.fillStyle='#fcd34d';ctx.fillRect(wx-4,wy-14,8,6);
  } else if(t==='gem'){
    const b=Math.sin(tick*.08+wx+wy)*2;
    const gl=.6+Math.sin(tick*.1+wx+wy)*.4;
    ctx.fillStyle=`rgba(251,191,36,${gl*.3})`;ctx.beginPath();ctx.arc(wx,wy-14+b,16,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fcd34d';
    ctx.beginPath();ctx.moveTo(wx,wy-22+b);ctx.lineTo(wx+6,wy-16+b);ctx.lineTo(wx+4,wy-8+b);ctx.lineTo(wx-4,wy-8+b);ctx.lineTo(wx-6,wy-16+b);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.moveTo(wx,wy-22+b);ctx.lineTo(wx-2,wy-16+b);ctx.lineTo(wx-2,wy-12+b);ctx.closePath();ctx.fill();
  } else if(t==='portal'){
    const pf=Math.sin(tick*.06);
    const r=26+pf*3;
    const LD=LEVELS[G.level-1];
    const active=G.gems>=LD.gemsNeeded;
    ctx.fillStyle=active?`rgba(129,140,248,${.3+.2*pf})`:'rgba(100,100,120,.2)';
    for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(wx,wy-r/2,r-i*6,r/2-i*3,0,0,Math.PI*2);ctx.fill();}
    ctx.strokeStyle=active?'#c7d2fe':'#475569';ctx.lineWidth=2;
    if(!active){ctx.setLineDash([4,4]);}
    ctx.beginPath();ctx.ellipse(wx,wy-r/2,r,r/2,0,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    if(!active){
      ctx.fillStyle='#94a3b8';ctx.font='9px monospace';ctx.textAlign='center';
      ctx.fillText('LOCKED',wx,wy-r/2+3);
    }
    if(active){
      for(let i=0;i<8;i++){
        const a=tick*.03+i*Math.PI/4;
        ctx.fillStyle='#fcd34d';ctx.fillRect(wx+Math.cos(a)*r-1,wy-r/2+Math.sin(a)*r/2-1,2,2);
      }
    }
  }
}

// ─── COLLISION ──────────────────────────────────────────────────────────────
function collide(x,y){
  const L=LEVELS[G.level-1];
  if(x<18||y<36||x>L.size.w*T-18||y>L.size.h*T-18) return true;
  for(const o of G.objs){
    if(o.collected||o.defeated) continue;
    const ox=o.x*T+T/2, oy=o.y*T+T/2;
    if(o.t==='tree'&&(x-ox)**2+(y-oy+8)**2<15**2) return true;
    if(o.t==='rock'&&Math.abs(x-ox)<13&&Math.abs(y-oy)<9) return true;
    if(o.t==='stall'&&Math.abs(x-ox)<14&&Math.abs(y-oy)<8) return true;
    if(o.t==='sign'&&Math.abs(x-ox)<10&&Math.abs(y-oy)<7) return true;
  }
  return false;
}

function touchThorns(x,y){
  for(const o of G.objs){
    if(o.t!=='thorns'||o.defeated) continue;
    const ox=o.x*T+T/2,oy=o.y*T+T/2;
    if(Math.abs(x-ox)<15&&Math.abs(y-oy)<11) return true;
  }
  return false;
}

function touchWater(x,y){
  for(const o of G.objs){
    if(o.t!=='water') continue;
    const ox=o.x*T+T/2,oy=o.y*T+T/2;
    if(Math.abs(x-ox)<T/2&&Math.abs(y-oy)<T/2) return true;
  }
  return false;
}

// ─── MOVE ───────────────────────────────────────────────────────────────────
function movePlayer(dx,dy){
  const P=G.P;
  const spd=4.2;
  const nx=P.x+dx*spd, ny=P.y+dy*spd;
  if(!collide(nx,P.y)) P.x=nx;
  if(!collide(P.x,ny)) P.y=ny;
  if(dx||dy){
    P.moving=true;
    if(Math.abs(dx)>Math.abs(dy)) P.dir=dx>0?'right':'left';
    else if(dy) P.dir=dy>0?'down':'up';
    P.wt++;if(P.wt>=7){P.wt=0;P.wf=(P.wf+1)%4;}
    P.idle=0;
  } else {
    P.moving=false;P.wf=0;P.idle=(P.idle||0)+1;
  }
}

// ─── UI HELPERS ─────────────────────────────────────────────────────────────
let toastTimeout=null;
function toast(msg,dur){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';
  clearTimeout(toastTimeout);
  G.toastT=dur||140;
  toastTimeout=setTimeout(()=>el.style.display='none',dur?dur*16:2400);
}

function showOverlay(html){
  document.getElementById('scr').innerHTML=html;
  document.getElementById('overlay').style.display='flex';
}
function hideOverlay(){document.getElementById('overlay').style.display='none';}

function updateHUD(){
  const L=LEVELS[G.level-1];
  const ch=L&&L.chapter?L.chapter:2;
  document.getElementById('hch').textContent=ch;
  // display level within its chapter
  const lvlInChapter=ch===3?G.level-3:G.level;
  document.getElementById('hlvl').textContent=lvlInChapter;
  document.getElementById('hgems').textContent=G.gems+'/'+G.gemsNeeded;
  document.getElementById('hstars').textContent=G.stars;
  document.getElementById('hquest').textContent=G.questText;
  // hearts
  const h=document.getElementById('hearts');
  h.innerHTML='';
  for(let i=0;i<G.maxHp;i++){
    const hrt=document.createElement('span');
    hrt.style.cssText='font-size:14px;line-height:1;margin-right:2px';
    hrt.textContent=i<G.hp?'♥':'♡';
    hrt.style.color=i<G.hp?'#f9a8d4':'#444';
    h.appendChild(hrt);
  }
  // boss bar
  if(G.boss&&!G.boss.defeated){
    const bb=document.getElementById('bossbar');
    bb.style.display='block';
    document.getElementById('bossname').textContent=G.boss.name;
    const pct=Math.max(0,G.boss.hp/G.boss.maxHp)*100;
    document.getElementById('bossbar-fill').style.width=pct+'%';
    // phase segment marker at 60% and 30% — render once via CSS on the track
    const track=document.getElementById('bosstrack');
    if(!track._segsAdded){
      track._segsAdded=true;
      ['60%','30%'].forEach(left=>{
        const s=document.createElement('div');
        s.style.cssText='position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.3);left:'+left;
        track.appendChild(s);
      });
    }
    const phTxt=G.boss.phases[G.boss.currentPhase-1];
    document.getElementById('bossbar-phase').textContent=phTxt?phTxt.desc:'';
  } else {
    document.getElementById('bossbar').style.display='none';
  }
  // shield badge
  const shBadge=document.getElementById('badge-shield');
  shBadge.textContent=G.shieldCharge;
  shBadge.style.display=G.shieldCharge>0?'block':'none';
  // staff badge
  document.getElementById('badge-crystal').style.display=G.hasStaff?'none':'block';
}

function setQuest(q){G.questText=q;updateHUD();}

// ─── DIALOG SYSTEM ──────────────────────────────────────────────────────────
function openNpcDialog(npc){
  G.dialog={npc,idx:0};
  G.phase='dialog';
  renderDialog();
}

function renderDialog(){
  if(!G.dialog) return;
  const {npc,idx}=G.dialog;
  const line=npc.dialog[idx];
  const dlg=document.getElementById('dlgbox');
  dlg.style.display='block';
  document.getElementById('dlg-who').textContent=npc.name;
  document.getElementById('dlg-text').textContent=line.a;
  // draw face
  const fc=document.getElementById('dlg-face').getContext('2d');
  fc.imageSmoothingEnabled=false;
  fc.clearRect(0,0,32,32);
  fc.fillStyle=npc.hair||'#78350f';fc.fillRect(6,2,20,6);
  fc.fillStyle=npc.skin||'#fde68a';fc.fillRect(8,8,16,12);
  fc.fillStyle='#1e1b4b';fc.fillRect(11,13,2,2);fc.fillRect(19,13,2,2);
  fc.fillStyle=npc.color;fc.fillRect(5,20,22,12);
  npc.talked=true;
  // build options
  const opts=document.getElementById('dlg-opts');
  opts.innerHTML='';
  const followUps=npc.dialog.filter((d,i)=>i>idx&&d.q).slice(0,3);
  followUps.forEach(opt=>{
    const b=document.createElement('button');
    b.className='dopt';b.textContent=opt.q;
    const ni=npc.dialog.indexOf(opt);
    b.onclick=()=>{
      if(opt.clue&&!G.clues.includes(opt.clue)) G.clues.push(opt.clue);
      if(opt.gives==='shield'){G.shieldCharge=Math.min(3,G.shieldCharge+3);toast('★ +3 Shield charges received!');save();}
      G.dialog.idx=ni;renderDialog();
    };
    opts.appendChild(b);
  });
  const close=document.createElement('button');
  close.className='dopt';close.textContent='[Close]';
  close.onclick=closeDialog;
  opts.appendChild(close);
}

function closeDialog(){
  G.dialog=null;
  document.getElementById('dlgbox').style.display='none';
  if(G.phase==='dialog') G.phase='play';
}

// ─── CUTSCENE CHAIN ─────────────────────────────────────────────────────────
function runCutscene(chain,onDone){
  let ci=0,li=0;
  G.phase='cutscene';
  function show(){
    const ch=chain[ci];
    const line=ch.lines[li];
    document.getElementById('dlgbox').style.display='block';
    document.getElementById('dlg-who').textContent=ch.speaker;
    document.getElementById('dlg-who').style.color=ch.color||'#fcd34d';
    document.getElementById('dlg-text').textContent=line;
    // draw face for cutscene
    const fc=document.getElementById('dlg-face').getContext('2d');
    fc.imageSmoothingEnabled=false;fc.clearRect(0,0,32,32);
    if(ch.hair){fc.fillStyle=ch.hair;fc.fillRect(6,2,20,6);}
    if(ch.skin){fc.fillStyle=ch.skin;fc.fillRect(8,8,16,12);fc.fillStyle='#1e1b4b';fc.fillRect(11,13,2,2);fc.fillRect(19,13,2,2);}
    fc.fillStyle=ch.color||'#6d28d9';fc.fillRect(5,20,22,12);
    const opts=document.getElementById('dlg-opts');
    opts.innerHTML='';
    const next=document.createElement('button');
    next.className='dopt';next.textContent=li<ch.lines.length-1?'Continue...':'[Next]';
    next.onclick=()=>{
      li++;
      if(li>=ch.lines.length){ci++;li=0;}
      if(ci>=chain.length){closeDialog();G.phase='play';if(onDone)onDone();}
      else show();
    };
    opts.appendChild(next);
  }
  show();
}

// ─── BOSS SYSTEM ────────────────────────────────────────────────────────────
function spawnBoss(){
  const L=LEVELS[G.level-1];
  const BD=L.boss;
  G.boss={
    ...BD,
    hp:BD.hp, maxHp:BD.hp,
    px:BD.x*T+T/2, py:BD.y*T+T/2,
    currentPhase:1,
    hitFlash:0,
    glowR:BD.id==='root_warden'?50:BD.id==='grey_tide'?14:109,
    glowG:BD.id==='root_warden'?200:BD.id==='grey_tide'?165:40,
    glowB:BD.id==='root_warden'?50:BD.id==='grey_tide'?233:217,
    attackTimer:0,
    moveDir:{x:0,y:0},
    moveTimer:0,
    stunTimer:0,
    midFightFired:[],
    defeated:false,
    phase:BD.phase||1,
    shockwaves:[],
    voidZones:[],
    clones:[],
  };
  G.phase='boss';
  G.projectiles=[];
  setQuest('DEFEAT '+BD.name+'!');
  updateHUD();
  document.getElementById('bossbar').style.display='block';
  document.getElementById('bossname').textContent=BD.name;

  // pre-fight dialog
  runCutscene(BD.preDialog,()=>{G.phase='boss';});
}

function updateBoss(){
  const B=G.boss;
  if(!B||B.defeated) return;
  B.attackTimer++;
  if(B.hitFlash>0) B.hitFlash--;

  // always tick existing shockwaves/voidZones so they don't freeze during stun
  if(B.shockwaves) B.shockwaves=B.shockwaves.filter(sw=>{sw.radius+=sw.speed;return sw.radius<sw.maxRadius;});
  if(B.voidZones) B.voidZones=B.voidZones.filter(vz=>{
    vz.life--;
    if(vz.life<=0&&!vz.exploded){
      vz.exploded=true;
      spawnParticles(vz.x,vz.y,'#7c3aed',16);
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2;
        G.projectiles.push({x:vz.x,y:vz.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,type:'wave',r:6,life:120,fromBoss:true});
      }
      return false;
    }
    return vz.life>0;
  });

  if(B.stunTimer>0){B.stunTimer--;return;}

  const ph=B.phases[B.currentPhase-1];
  const P=G.P;
  const dx=P.x-B.px, dy=P.y-B.py;
  const dist=Math.sqrt(dx*dx+dy*dy);

  // boss movement — orbit toward player
  if(B.moveTimer<=0){
    const ang=Math.atan2(dy,dx)+(.5-.7*Math.random())*Math.PI;
    const spd=ph.speed*0.8;
    B.moveDir={x:Math.cos(ang)*spd,y:Math.sin(ang)*spd};
    B.moveTimer=40+Math.random()*40;
  }
  B.moveTimer--;
  const L=LEVELS[G.level-1];
  const nbx=B.px+B.moveDir.x, nby=B.py+B.moveDir.y;
  if(nbx>40&&nbx<L.size.w*T-40) B.px=nbx;
  if(nby>40&&nby<L.size.h*T-40) B.py=nby;

  // update clones (Mirror Twin) — drift toward random targets
  if(B.clones){
    for(const c of B.clones){
      if(c.moveTimer<=0){
        const ang=Math.random()*Math.PI*2;
        c.moveDir={x:Math.cos(ang)*ph.speed*0.7,y:Math.sin(ang)*ph.speed*0.7};
        c.moveTimer=40+Math.random()*40;
      }
      c.moveTimer--;
      const cnbx=c.px+c.moveDir.x, cnby=c.py+c.moveDir.y;
      if(cnbx>40&&cnbx<L.size.w*T-40) c.px=cnbx;
      if(cnby>40&&cnby<L.size.h*T-40) c.py=cnby;
    }
  }

  // attack
  if(B.attackTimer>=ph.shootRate){
    B.attackTimer=0;
    fireAttack(B,ph.pattern,P);
  }

  // player contact damage
  if(dist<B.size*0.7&&P.hf<=0){
    if(!P.blocking){
      G.hp--;P.hf=50;
      flashDamage();
      if(G.hp<=0){playerDied();return;}
      updateHUD();
    }
  }

  // mid fight dialog triggers
  if(B.midFightDialog){
    for(const mfd of B.midFightDialog){
      const pct=B.hp/B.maxHp;
      if(!B.midFightFired.includes(mfd.hpPct)&&pct<=mfd.hpPct){
        B.midFightFired.push(mfd.hpPct);
        B.stunTimer=80;
        G.phase='cutscene';
        const chain=mfd.lines.map(l=>({speaker:l.speaker,color:l.color||(l.speaker==='Angie'?'#6d28d9':'#2563eb'),lines:[l.line],hair:l.speaker==='Angie'?'#78350f':l.speaker==='Kevin'?'#78350f':undefined,skin:l.speaker==='Angie'?'#fde68a':l.speaker==='Kevin'?'#fde68a':undefined}));
        runCutscene(chain,()=>{G.phase='boss';});
      }
    }
  }

  // phase transitions
  const pct=B.hp/B.maxHp;
  const newPhase=pct<=0.3?3:pct<=0.6?2:1;
  if(newPhase>B.currentPhase){
    B.currentPhase=newPhase;
    B.stunTimer=30;
    toast('⚠ '+B.phases[newPhase-1].desc.toUpperCase());
    updateHUD();
  }
}

function fireAttack(boss,pattern,P){
  const dx=P.x-boss.px, dy=P.y-boss.py;
  const ang=Math.atan2(dy,dx);
  const spd=2.2+boss.currentPhase*.6;

  // Root Warden creates shockwaves
  if(boss.name==='ROOT WARDEN'&&(pattern==='roots'||pattern==='sweep'||pattern==='frenzy')){
    const swCount=boss.currentPhase===1?1:boss.currentPhase===2?2:3;
    const swSpeed=boss.currentPhase===1?2:boss.currentPhase===2?3:4;
    for(let i=0;i<swCount;i++){
      boss.shockwaves.push({
        x:boss.px,y:boss.py,
        radius:0,maxRadius:150,
        speed:swSpeed,hit:false
      });
    }
  }

  if(pattern==='roots'||pattern==='wave'){
    // 3-way spread
    for(let s=-1;s<=1;s++){
      const a=ang+s*.3;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,type:pattern==='roots'?'root':'wave',r:6,life:180,fromBoss:true});
    }
  } else if(pattern==='sweep'||pattern==='spiral'){
    // rotating burst
    const count=boss.currentPhase>=2?8:5;
    for(let i=0;i<count;i++){
      const a=ang+(i/count)*Math.PI*2;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(a)*spd*.9,vy:Math.sin(a)*spd*.9,type:'wave',r:7,life:160,fromBoss:true});
    }
  } else if(pattern==='frenzy'||pattern==='grief'){
    // aimed + random
    for(let i=0;i<4;i++){
      const ra=ang+(Math.random()-.5)*Math.PI;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(ra)*spd*1.1,vy:Math.sin(ra)*spd*1.1,type:'wave',r:8,life:200,fromBoss:true});
    }
    G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(ang)*spd*1.4,vy:Math.sin(ang)*spd*1.4,type:'wave',r:5,life:200,fromBoss:true});
  } else if(pattern==='slam'||pattern==='rain'){
    // slam + projectile
    G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(ang)*spd*1.5,vy:Math.sin(ang)*spd*1.5,type:'slam',r:9,life:140,fromBoss:true});
    for(let i=0;i<3;i++){
      const ra=ang+(i-1)*.4;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(ra)*spd,vy:Math.sin(ra)*spd,type:'slam',r:6,life:160,fromBoss:true});
    }
  } else if(pattern==='nova'){
    // all directions
    const count=12;
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(a)*spd*1.1,vy:Math.sin(a)*spd*1.1,type:'slam',r:7,life:200,fromBoss:true});
    }
  } else if(pattern==='teleport'){
    // Astral Devourer — drop void zone, teleport near player, fire spread
    boss.voidZones=boss.voidZones||[];
    boss.voidZones.push({x:boss.px,y:boss.py,life:60+boss.currentPhase*15,maxLife:60+boss.currentPhase*15,r:38,exploded:false});
    const teleAng=Math.random()*Math.PI*2;
    const teleDist=120+Math.random()*60;
    const L=LEVELS[G.level-1];
    boss.px=Math.max(60,Math.min(L.size.w*T-60,P.x+Math.cos(teleAng)*teleDist));
    boss.py=Math.max(60,Math.min(L.size.h*T-60,P.y+Math.sin(teleAng)*teleDist));
    spawnParticles(boss.px,boss.py-20,'#a78bfa',12);
    // fire 3-way spread after teleport
    const dx2=P.x-boss.px, dy2=P.y-boss.py;
    const ang2=Math.atan2(dy2,dx2);
    for(let s=-1;s<=1;s++){
      const a=ang2+s*.25;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,type:'wave',r:6,life:180,fromBoss:true});
    }
  } else if(pattern==='reflect'){
    // Mirror Twin solo — mirror barrage (5 projectiles in tight spread)
    for(let i=-2;i<=2;i++){
      const a=ang+i*0.18;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,type:'wave',r:6,life:180,fromBoss:true});
    }
  } else if(pattern==='split2'||pattern==='split3'){
    // Mirror Twin — spawn clones if not yet, fire from all
    boss.clones=boss.clones||[];
    const wantClones=pattern==='split2'?1:2;
    while(boss.clones.length<wantClones){
      const cAng=Math.random()*Math.PI*2;
      boss.clones.push({
        px:boss.px+Math.cos(cAng)*80,
        py:boss.py+Math.sin(cAng)*80,
        moveDir:{x:0,y:0},moveTimer:0
      });
    }
    // fire from boss + each clone
    const positions=[{x:boss.px,y:boss.py},...boss.clones.map(c=>({x:c.px,y:c.py}))];
    for(const pos of positions){
      const cdx=P.x-pos.x, cdy=P.y-pos.y;
      const cang=Math.atan2(cdy,cdx);
      G.projectiles.push({x:pos.x,y:pos.y,vx:Math.cos(cang)*spd,vy:Math.sin(cang)*spd,type:'wave',r:6,life:180,fromBoss:true});
    }
  } else if(pattern==='shockwave'){
    // Starfall Empress phase 1 — shockwaves like Root Warden
    boss.shockwaves=boss.shockwaves||[];
    const swCount=2;
    for(let i=0;i<swCount;i++){
      boss.shockwaves.push({
        x:boss.px,y:boss.py,
        radius:0,maxRadius:170,
        speed:3,hit:false
      });
    }
    // also fire 3-way spread
    for(let s=-1;s<=1;s++){
      const a=ang+s*.3;
      G.projectiles.push({x:boss.px,y:boss.py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,type:'wave',r:6,life:180,fromBoss:true});
    }
  }
}

function hitBoss(dmg){
  const B=G.boss;
  if(!B||B.defeated) return;
  B.hp=Math.max(0,B.hp-dmg);
  B.hitFlash=12;
  spawnParticles(B.px,B.py-30,'#fcd34d',6);
  updateHUD();
  if(B.hp<=0) bossDied();
}

function bossDied(){
  const B=G.boss;
  const L=LEVELS[G.level-1];
  B.defeated=true;
  G.projectiles=[];
  document.getElementById('bossbar').style.display='none';
  spawnParticles(B.px,B.py-40,'#fcd34d',30);
  spawnParticles(B.px,B.py-40,'#c084fc',20);
  G.stars+=3;save();
  // post fight dialog
  G.phase='cutscene';
  runCutscene(L.boss.postDialog,()=>{
    G.phase='play';
    if(L.boss.loot==='staff'){
      G.hasStaff=true;
      document.getElementById('badge-crystal').style.display='none';
      toast('★ Crystal Staff unlocked! Press 3 to use.',180);
      save();
    }
    setQuest('Find the portal!');
    updateHUD();
    // unlock portal
    const portal=G.objs.find(o=>o.t==='portal');
    if(portal) portal.active=true;
  });
}

function flashDamage(){
  const el=document.getElementById('dmgflash');
  el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',100);
}

function playerDied(){
  G.phase='over';
  setTimeout(()=>{
    showOverlay(`
      <h2>Angie fell...</h2>
      <p>The valley still needs her. Rest, and try again.</p>
      <div class="hearts" style="font-size:22px">♡♡♡♡♡</div>
      <div class="ml">
        <button onclick="retryLevel()">Try Again</button>
        <button class="sec" onclick="openMenu()">Menu</button>
      </div>
    `);
  },400);
}

// ─── PARTICLES ──────────────────────────────────────────────────────────────
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    G.particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*4-1,life:40,maxLife:40,color});
  }
}

// ─── INTERACTION ────────────────────────────────────────────────────────────
function doTalk(){
  if(G.phase==='dialog'){closeDialog();return}
  if(G.phase!=='play') return;
  const P=G.P;
  // nearest NPC
  let best=null,bestD=62**2;
  for(const n of G.npcs){
    const nx=n.x*T+T/2,ny=n.y*T+T/2;
    const d=(P.x-nx)**2+(P.y-ny)**2;
    if(d<bestD){bestD=d;best=n;}
  }
  if(best){openNpcDialog(best);return}
  // sign
  for(const o of G.objs){
    if(o.t!=='sign') continue;
    const ox=o.x*T+T/2,oy=o.y*T+T/2;
    if(Math.abs(P.x-ox)<48&&Math.abs(P.y-oy)<48){
      G.dialog={sign:true};
      G.phase='dialog';
      document.getElementById('dlgbox').style.display='block';
      document.getElementById('dlg-who').textContent='Sign';
      document.getElementById('dlg-who').style.color='#fcd34d';
      document.getElementById('dlg-text').textContent=o.msg;
      document.getElementById('dlg-face').getContext('2d').clearRect(0,0,32,32);
      const opts=document.getElementById('dlg-opts');
      opts.innerHTML='<button class="dopt" onclick="closeDialog()">[Close]</button>';
      return;
    }
  }
  toast('Nobody nearby...');
}

window.closeDialog=closeDialog;

function doAct(){
  if(G.phase==='dialog'){closeDialog();return}
  if(G.phase!=='play'&&G.phase!=='boss') return;
  const P=G.P;

  if(G.tool==='shield'){
    if(G.shieldCharge>0){
      P.blocking=true;P.blockTimer=120;G.shieldCharge--;
      toast('Shield activated! Blocking for 2 seconds.');
      updateHUD();
    } else {
      toast('No shield charges! Talk to NPCs to find more.');
    }
  } else if(G.tool==='crystal'){
    if(!G.hasStaff){toast('You don\'t have the Crystal Staff yet. Defeat the Root Warden!');return;}
    if(P.sw>0) return; // cooldown — prevent spam
    // fire star bolt toward boss
    if(G.boss&&!G.boss.defeated){
      const B=G.boss;
      const dx=B.px-P.x,dy=B.py-P.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      const spd=6;
      G.projectiles.push({x:P.x,y:P.y,vx:dx/d*spd,vy:dy/d*spd,type:'star',life:120,fromBoss:false,dmg:10});
      P.sw=35;
      spawnParticles(P.x,P.y-20,'#a78bfa',5);
    } else if(G.phase==='play'){
      // in non-boss: heal slightly
      const p=G.P;
      p.sw=35;
      spawnParticles(p.x,p.y-20,'#a78bfa',8);
      toast('Crystal staff pulses...');
    }
  } else if(G.tool==='journal'){
    const clueTxt=G.clues.length?G.clues.map(c=>'<p class="clue">• '+c+'</p>').join(''):'<p>No clues yet — talk to everyone!</p>';
    showOverlay(`
      <h2>Angie's Journal</h2>
      <div class="story">
        <b>Chapter ${LEVELS[G.level-1].chapter||2}, Level ${LEVELS[G.level-1].chapter===3?G.level-3:G.level}: ${LEVELS[G.level-1].name}</b><br>
        Gems: ${G.gems}/${G.gemsNeeded} · Stars: ${G.stars} · HP: ${G.hp}/${G.maxHp}
      </div>
      <div class="story">${clueTxt}</div>
      <div class="ml">
        <button onclick="resumeGame()">Close</button>
      </div>
    `);
  } else {
    // hand/sword — try to interact with nearest NPC, sign, or attack boss
    if(G.boss&&!G.boss.defeated){
      if(P.sw>0) return; // cooldown — prevent spam
      const B=G.boss;
      const swordDmg=G.hasSword?7:4;
      // check main boss
      const dx=B.px-P.x,dy=B.py-P.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<80){
        hitBoss(swordDmg);
        P.sw=40;
        spawnParticles(P.x,P.y-20,'#f87171',8);
        return;
      }
      // check clones
      if(B.clones){
        for(const c of B.clones){
          const cd=Math.hypot(c.px-P.x,c.py-P.y);
          if(cd<80){
            hitBoss(swordDmg);
            P.sw=40;
            spawnParticles(P.x,P.y-20,'#67e8f9',8);
            return;
          }
        }
      }
    }
    doTalk();
  }
}

window.hideOverlay=hideOverlay;

// ─── GEM / PORTAL CHECKS ────────────────────────────────────────────────────
function checkPickups(){
  if(G.phase!=='play'&&G.phase!=='boss') return;
  const P=G.P;
  const L=LEVELS[G.level-1];

  for(const o of G.objs){
    if(o.collected) continue;
    const ox=o.x*T+T/2, oy=o.y*T+T/2;
    if(o.t==='gem'&&(P.x-ox)**2+(P.y-oy)**2<26**2){
      o.collected=true;G.gems++;
      spawnParticles(ox,oy-14,'#fcd34d',12);
      toast('✦ Star-gem ('+(G.gems)+'/'+G.gemsNeeded+')');
      if(G.gems>=L.gemsNeeded&&!G.boss&&!G.bossIntroShown){
        G.bossIntroShown=true;
        setQuest('Boss awakening...');
        setTimeout(spawnBoss,800);
      } else if(G.gems<L.gemsNeeded){
        setQuest('Find gems: '+G.gems+'/'+G.gemsNeeded);
      }
      save();updateHUD();
    }
  }

  // portal — only after boss defeated
  const portal=G.objs.find(o=>o.t==='portal');
  if(portal&&G.boss&&G.boss.defeated){
    const ox=portal.x*T+T/2,oy=portal.y*T+T/2;
    if((P.x-ox)**2+(P.y-oy)**2<30**2){
      if(G.level<LEVELS.length) levelComplete();
      else gameComplete();
    }
  }
}

// ─── PROJECTILE UPDATE ──────────────────────────────────────────────────────
function updateProjectiles(){
  const P=G.P;
  G.projectiles=G.projectiles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0) return false;
    if(p.fromBoss){
      if((P.x-p.x)**2+(P.y-p.y)**2<(p.r+12)**2){
        if(P.blocking){
          // deflect
          spawnParticles(p.x,p.y,'#60a5fa',5);
          return false;
        }
        if(P.hf<=0){
          G.hp--;P.hf=50;flashDamage();
          if(G.hp<=0){playerDied();return false;}
          updateHUD();
        }
        return false;
      }
    } else {
      // player bullet
      if(G.boss&&!G.boss.defeated){
        const B=G.boss;
        if((B.px-p.x)**2+(B.py-p.y-B.size/2)**2<(B.size*.7)**2){
          hitBoss(p.dmg||12);
          spawnParticles(p.x,p.y,'#fcd34d',5);
          return false;
        }
        // also damage clones
        if(B.clones){
          for(const c of B.clones){
            if((c.px-p.x)**2+(c.py-p.y-B.size/2)**2<(B.size*.6)**2){
              hitBoss(p.dmg||12);
              spawnParticles(p.x,p.y,'#67e8f9',5);
              return false;
            }
          }
        }
      }
    }
    return true;
  });
}

// ─── LEVEL FLOW ─────────────────────────────────────────────────────────────
function loadLevel(n){
  G.level=n;
  const L=LEVELS[n-1];
  // grant sword for Chapter 3
  if(L.chapter===3) G.hasSword=true;
  G.gemsNeeded=L.gemsNeeded;
  G.gems=0;
  G.boss=null;
  G.bossIntroShown=false;
  G.projectiles=[];
  G.particles=[];
  G.objs=L.objs.map(o=>({...o,collected:false,defeated:false}));
  G.npcs=L.npcs.map(n=>({...n,talked:false}));
  G.P.x=L.startPos.x*T+T/2;
  G.P.y=L.startPos.y*T+T/2;
  G.P.dir='right';G.P.moving=false;G.P.hf=0;G.P.sw=0;G.P.blocking=false;G.P.blockTimer=0;
  G.cat.x=G.P.x-50;G.cat.y=G.P.y+10;
  G.cat.vx=0;G.cat.vy=0;G.cat.dir='right';G.cat.animFrame=0;G.cat.animTick=0;
  spawnAnimals(L);
  G.cam.x=G.P.x-VW/2;
  G.cam.y=G.P.y-VH*0.65;
  G.phase='play';
  setQuest('Find '+G.gemsNeeded+' gems');
  updateHUD();
  save();
  hideOverlay();
}

function levelComplete(){
  G.phase='menu';
  const L=LEVELS[G.level-1];
  const nL=LEVELS[G.level] || LEVELS[LEVELS.length-1];
  G.stars+=2;save();
  const curCh=L.chapter||2, nextCh=nL.chapter||2;
  const chapterTransition=(nextCh>curCh)?`<p style="color:#fcd34d;font-size:14px;letter-spacing:2px">★ CHAPTER ${nextCh} BEGINS ★</p>`:'';
  showOverlay(`
    <h2>Chapter ${curCh} — Level ${L.chapter===3?G.level-3:G.level} Complete</h2>
    <p style="color:#f9a8d4;font-size:13px">★ ★ ★ ${G.stars} stars collected ★ ★ ★</p>
    <div class="story">
      <b>${L.boss.name}</b> has been defeated.<br>
      ${G.clues.slice(-2).map(c=>'<p class="clue">• '+c+'</p>').join('')}
    </div>
    ${chapterTransition}
    <p style="color:#fcd34d;font-size:13px">Next: ${nL.name}</p>
    <p>${nL.story.replace(/\n/g,'<br>')}</p>
    <div class="hint"><b>Tip:</b> ${nL.tip}</div>
    <div class="ml">
      <button onclick="startNextLevel()">Continue →</button>
      <button class="sec" onclick="openMenu()">Menu</button>
    </div>
  `);
}

window.startNextLevel=function(){
  G.level++;G.hp=G.maxHp;
  const L=LEVELS[G.level-1];
  loadLevel(G.level);
  // show pre-chain cutscene
  if(L.preChain){
    G.phase='cutscene';
    runCutscene(L.preChain,()=>{G.phase='play';});
  }
};

function gameComplete(){

    <p style="color:#c4b5fd">The valley breathes again.<br>They walked home together under a sky that finally held still.</p>
    <div class="story">
      <b>Final stats:</b> ${G.stars} stars · ${G.clues.length} clues found
    </div>
    <div class="ml">
      <button onclick="newGame()">Play Again</button>
      <button class="sec" onclick="openMenu()">Main Menu</button>
    </div>
  `);
  setTimeout(()=>{
    const c=document.getElementById('end-art');
    if(!c) return;
    const ec=c.getContext('2d');
    ec.imageSmoothingEnabled=false;
    ec.fillStyle='#120524';ec.fillRect(0,0,100,80);
    // stars
    for(let i=0;i<40;i++){
      ec.fillStyle=`rgba(255,255,200,${Math.random()*.8+.2})`;
      ec.fillRect(Math.random()*100,Math.random()*50,2,2);
    }
    // angie silhouette
    ec.fillStyle='#6d28d9';ec.fillRect(30,52,14,22);
    ec.fillStyle='#fde68a';ec.fillRect(33,44,8,12);
    ec.fillStyle='#78350f';ec.fillRect(31,42,12,6);
    // kevin silhouette
    ec.fillStyle='#2563eb';ec.fillRect(56,52,14,22);
    ec.fillStyle='#fde68a';ec.fillRect(59,44,8,12);
    ec.fillStyle='#78350f';ec.fillRect(57,42,12,6);
    // connecting moment
    ec.fillStyle='#fcd34d';ec.beginPath();ec.arc(50,58,3,0,Math.PI*2);ec.fill();
  },100);
}

window.newGame=function(){clearSave();location.reload();};

function retryLevel(){
  // soft restart — preserve gem progress (checkpoint)
  const savedCollected=G.objs.map(o=>({collected:!!o.collected,defeated:!!o.defeated}));
  const savedGems=G.gems;
  G.hp=G.maxHp;
  loadLevel(G.level);
  G.gems=savedGems;
  for(let i=0;i<G.objs.length&&i<savedCollected.length;i++){
    G.objs[i].collected=savedCollected[i].collected;
    G.objs[i].defeated=savedCollected[i].defeated;
  }
  // if boss was triggered, respawn immediately
  if(G.gems>=G.gemsNeeded){
    G.bossIntroShown=true;
    setTimeout(spawnBoss,400);
  }
  updateHUD();
}
window.retryLevel=retryLevel;

function restartLevel(){
  if(G.phase!=='play'&&G.phase!=='boss') return;
  retryLevel();
  toast('Level restarted');
}
