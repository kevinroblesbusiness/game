window.startNewGame=function(){
  clearSave();G.hp=5;G.stars=0;G.clues=[];G.hasStaff=false;G.shieldCharge=0;
  loadLevel(1);
  const L=LEVELS[0];
  if(L.preChain){G.phase='cutscene';runCutscene(L.preChain,()=>{G.phase='play';});}
};

window.continueGame=function(){
  const sv=loadSave();
  if(!sv){window.startNewGame();return;}
  G.level=sv.level||1;G.stars=sv.stars||0;G.clues=sv.clues||[];G.hasStaff=sv.hasStaff||false;G.hasSword=sv.hasSword||false;
  G.hp=5;G.shieldCharge=0;
  loadLevel(G.level);
};

// ─── MAIN LOOP ──────────────────────────────────────────────────────────────
function update(){
  G.tick++;
  const P=G.P;

  // block timer
  if(P.blocking){
    P.blockTimer--;
    if(P.blockTimer<=0){P.blocking=false;P.blockTimer=0;}
  }
  if(P.hf>0) P.hf--;
  if(P.sw>0) P.sw--;

  if(G.phase==='play'||G.phase==='boss'){
    const k=G.keys;
    let dx=0,dy=0;
    if(k['w']||k['ArrowUp']||k['up']) dy=-1;
    if(k['s']||k['ArrowDown']||k['down']) dy=1;
    if(k['a']||k['ArrowLeft']||k['left']) dx=-1;
    if(k['d']||k['ArrowRight']||k['right']) dx=1;
    if(dx&&dy){dx*=.707;dy*=.707;}
    movePlayer(dx,dy);

    // thorns
    if(touchThorns(P.x,P.y)&&P.hf<=0){
      G.hp--;P.hf=50;flashDamage();
      if(G.hp<=0){playerDied();return;}
      updateHUD();
    }

    checkPickups();
    if(G.phase==='boss') updateBoss();
    updateProjectiles();

    // shockwave collision
    if(G.boss&&G.boss.shockwaves){
      for(const sw of G.boss.shockwaves){
        const d=Math.hypot(P.x-sw.x,P.y-sw.y);
        const inRing=d>sw.radius-20&&d<sw.radius+20;
        if(inRing&&!sw.hit){
          if(P.blocking){
            sw.hit=true;
            spawnParticles(P.x,P.y,'#52b788',8);
          } else if(P.hf<=0){
            G.hp--;P.hf=50;flashDamage();
            if(G.hp<=0){playerDied();return;}
            updateHUD();
            sw.hit=true;
          }
        }
      }
    }

    // void zone damage (Astral Devourer)
    if(G.boss&&G.boss.voidZones){
      for(const vz of G.boss.voidZones){
        const d=Math.hypot(P.x-vz.x,P.y-vz.y);
        if(d<vz.r&&P.hf<=0&&!P.blocking){
          // damage when standing in void zone (reduced)
          if(G.tick%30===0){
            G.hp--;P.hf=40;flashDamage();
            if(G.hp<=0){playerDied();return;}
            updateHUD();
          }
        }
      }
    }

    // clone contact damage (Mirror Twin)
    if(G.boss&&G.boss.clones){
      for(const c of G.boss.clones){
        const d=Math.hypot(P.x-c.px,P.y-c.py);
        if(d<G.boss.size*0.6&&P.hf<=0&&!P.blocking){
          G.hp--;P.hf=50;flashDamage();
          if(G.hp<=0){playerDied();return;}
          updateHUD();
        }
      }
    }

    // cat companion follow
    updateCat();
    // animals
    updateAnimals();
  }

  G.particles=G.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;return p.life>0;
  });

  // camera — player stays at 60% vertical
  if(G.level>=1&&G.level<=LEVELS.length){
    const L=LEVELS[G.level-1];
    const tx=P.x-VW/2, ty=P.y-VH*.62;
    G.cam.x+=(tx-G.cam.x)*.16;
    G.cam.y+=(ty-G.cam.y)*.16;
    G.cam.x=Math.max(0,Math.min(L.size.w*T-VW,G.cam.x));
    G.cam.y=Math.max(0,Math.min(L.size.h*T-VH,G.cam.y));
  }
}

function render(){
  VW=cv.clientWidth||940;VH=cv.clientHeight||640;
  ctx.fillStyle='#07031a';ctx.fillRect(0,0,VW,VH);

  // background stars (always)
  for(let i=0;i<80;i++){
    const bx=((i*73+17)%(VW+100))-50;
    const by=((i*41+7)%(VH*.6));
    const tw=.25+.45*Math.sin(G.tick*.03+i*.7);
    ctx.fillStyle=`rgba(255,255,210,${tw})`;
    ctx.fillRect(bx,by,tw>.7?2:1,tw>.7?2:1);
  }

  if(G.phase==='menu'||G.phase==='title') return;

  const L=LEVELS[G.level-1];
  ctx.save();
  ctx.translate(-G.cam.x,-G.cam.y);

  // tile floor
  const c0=Math.max(0,Math.floor(G.cam.x/T));
  const c1=Math.min(L.size.w,Math.ceil((G.cam.x+VW)/T));
  const r0=Math.max(0,Math.floor(G.cam.y/T));
  const r1=Math.min(L.size.h,Math.ceil((G.cam.y+VH)/T));
  for(let y=r0;y<r1;y++){
    for(let x=c0;x<c1;x++){
      ctx.fillStyle=(x+y)%2===0?L.bg:L.bgAlt;
      ctx.fillRect(x*T,y*T,T,T);
      if((x*3+y*7)%11===0){ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(x*T+4,y*T+8,2,2);}
    }
  }

  // gather renderable objects sorted by Y (painter's algorithm)
  const drawList=[];
  for(const o of G.objs){
    if(o.collected||o.defeated) continue;
    drawList.push({y:o.y*T+T/2,draw:()=>drawTile(o.t,o.x*T+T/2,o.y*T+T/2,G.tick)});
  }
  for(const n of G.npcs){
    drawList.push({y:n.y*T+T/2,draw:()=>drawNPC(n,G.tick)});
  }
  drawList.push({y:G.P.y,draw:()=>{
    const P=G.P;
    drawAngie(P.x,P.y,P.dir,P.moving?P.wf:0,P.hf,P.blocking);
  }});
  drawList.push({y:G.cat.y,draw:()=>drawCat(G.cat.x,G.cat.y,G.cat.dir,G.cat.animFrame)});
  for(const a of G.animals){
    drawList.push({y:a.y,draw:()=>drawAnimal(a)});
  }
  if(G.boss&&!G.boss.defeated){
    drawList.push({y:G.boss.py,draw:()=>drawBoss(G.boss,G.tick)});
    // clones share boss sprite
    if(G.boss.clones){
      for(const c of G.boss.clones){
        drawList.push({y:c.py,draw:()=>{
          ctx.globalAlpha=0.7;
          drawBoss({...G.boss,px:c.px,py:c.py,hitFlash:0},G.tick);
          ctx.globalAlpha=1;
        }});
      }
    }
  }
  drawList.sort((a,b)=>a.y-b.y);
  for(const d of drawList) d.draw();

  // void zones (drawn on top of ground)
  if(G.boss&&G.boss.voidZones){
    for(const vz of G.boss.voidZones){
      const prog=vz.life/vz.maxLife;
      const danger=1-prog;
      ctx.fillStyle=`rgba(124,58,237,${0.25+danger*0.35})`;
      ctx.beginPath();ctx.arc(vz.x,vz.y,vz.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(196,181,253,${0.5+danger*0.5})`;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(vz.x,vz.y,vz.r,0,Math.PI*2);ctx.stroke();
      // pulsing inner ring as it's about to explode
      if(danger>0.5){
        const pulse=Math.sin(G.tick*0.3)*4;
        ctx.strokeStyle=`rgba(244,114,182,${danger})`;
        ctx.beginPath();ctx.arc(vz.x,vz.y,vz.r*0.6+pulse,0,Math.PI*2);ctx.stroke();
      }
    }
  }

  // shockwaves
  if(G.boss&&G.boss.shockwaves){
    for(const sw of G.boss.shockwaves){
      const prog=sw.radius/sw.maxRadius;
      ctx.strokeStyle=`rgba(82,183,136,${(1-prog)*0.6})`;
      for(let i=0;i<3;i++){
        const r=sw.radius-i*8;
        if(r<=0) continue;
        ctx.lineWidth=3-i;
        ctx.beginPath();
        ctx.arc(sw.x,sw.y,r,0,Math.PI*2);
        ctx.stroke();
      }
    }
  }

  // projectiles
  for(const p of G.projectiles) drawProjectile(p);

  // particles
  for(const p of G.particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);
    ctx.fillStyle='#fff';ctx.fillRect(p.x,p.y,1,1);
    ctx.globalAlpha=1;
  }

  // nearby indicator
  let nearNPC=null,nearDist=62**2;
  for(const n of G.npcs){
    const d=(G.P.x-n.x*T-T/2)**2+(G.P.y-n.y*T-T/2)**2;
    if(d<nearDist){nearDist=d;nearNPC=n;}
  }
  if(nearNPC&&(G.phase==='play'||G.phase==='boss')){
    const sx=nearNPC.x*T+T/2-G.cam.x;
    const sy=nearNPC.y*T-G.cam.y;
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(sx-55,sy-28,110,20);
    ctx.fillStyle='#67e8f9';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('TALK: '+nearNPC.name,sx,sy-13);
  }

  ctx.restore();
}

function loop(){update();render();requestAnimationFrame(loop);}

// ─── INPUT ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  G.keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(e.key==='t'||e.key==='T') doTalk();
  if(e.key==='r'||e.key==='R'){restartLevel();e.preventDefault();return;}
  if(e.key===' '||e.key==='Enter'){
    if(G.phase==='cutscene'){
      const btn=document.querySelector('#dlg-opts .dopt');
      if(btn) btn.click();
      e.preventDefault();return;
    }
    doAct();e.preventDefault();
  }
  if(e.key==='1') selectTool('hand');
  if(e.key==='2') selectTool('shield');
  if(e.key==='3') selectTool('crystal');
  if(e.key==='4') selectTool('journal');
  if(e.key==='Escape'){
    if(G.phase==='dialog') closeDialog();
    else if(G.phase==='play'||G.phase==='boss') openMenu();
    else if(G.phase==='menu'){hideOverlay();G.phase='play';}
  }
});
document.addEventListener('keyup',e=>G.keys[e.key]=false);

function bindBtn(id,dn,up){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('pointerdown',e=>{dn();el.classList.add('dn');e.preventDefault();});
  el.addEventListener('pointerup',()=>{if(up)up();el.classList.remove('dn');});
  el.addEventListener('pointerleave',()=>{if(up)up();el.classList.remove('dn');});
  el.addEventListener('pointercancel',()=>{if(up)up();el.classList.remove('dn');});
}
bindBtn('du',()=>G.keys['up']=true,()=>G.keys['up']=false);
bindBtn('dd',()=>G.keys['down']=true,()=>G.keys['down']=false);
bindBtn('dl',()=>G.keys['left']=true,()=>G.keys['left']=false);
bindBtn('dr',()=>G.keys['right']=true,()=>G.keys['right']=false);
bindBtn('btn-talk',doTalk);
bindBtn('btn-act',doAct);
document.getElementById('menu-btn').onclick=openMenu;
document.querySelectorAll('.slot').forEach(s=>s.addEventListener('click',()=>selectTool(s.dataset.t)));

window.G=G; // expose for inline onclick

// ─── RESIZE ─────────────────────────────────────────────────────────────────
function resize(){
  const w=cv.clientWidth||940,h=cv.clientHeight||640;
  cv.width=w;cv.height=h;VW=w;VH=h;
  ctx.imageSmoothingEnabled=false;
}
window.addEventListener('resize',resize);resize();

// ─── BOOT ────────────────────────────────────────────────────────────────────
loadLevel(1);
showTitle();
loop();
</script>
